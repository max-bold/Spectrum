name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version label for manually built artifacts
        required: false
        default: dev

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            suffix: windows-x86_64
            pyinstaller_target_arch: ""
          - name: macOS Intel
            os: macos-15-intel
            suffix: macos-x86_64
            pyinstaller_target_arch: x86_64
          - name: macOS Apple Silicon
            os: macos-14
            suffix: macos-arm64
            pyinstaller_target_arch: arm64

    env:
      APP_NAME: BM_Spectrum_${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}_${{ matrix.suffix }}
      PYINSTALLER_TARGET_ARCH: ${{ matrix.pyinstaller_target_arch }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app
        run: pyinstaller --clean --noconfirm BM_Spectrum_v0.2.spec

      - name: Verify macOS binary architecture
        if: runner.os == 'macOS'
        run: |
          binary_path="dist/${APP_NAME}.app/Contents/MacOS/${APP_NAME}"
          lipo -archs "${binary_path}"
          test "$(lipo -archs "${binary_path}")" = "${PYINSTALLER_TARGET_ARCH}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/${env:APP_NAME}.exe" -DestinationPath "${env:APP_NAME}.zip"

      - name: Package macOS binary
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}.app" "${APP_NAME}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}
          path: ${{ env.APP_NAME }}.zip

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: BM Spectrum ${{ github.ref_name }}
          files: release-assets/*.zip
          generate_release_notes: true
