name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: BM_Spectrum_v0.2_windows
            package: BM_Spectrum_v0.2_windows.zip
          - os: macos-latest
            artifact: BM_Spectrum_v0.2_macos
            package: BM_Spectrum_v0.2_macos.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app
        run: pyinstaller --clean --noconfirm BM_Spectrum_v0.2.spec

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/BM_Spectrum_v0.2.exe -DestinationPath ${{ matrix.package }}

      - name: Package macOS binary
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/BM_Spectrum_v0.2 ${{ matrix.package }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.package }}

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: BM Spectrum v0.2
          files: release-assets/*.zip
          generate_release_notes: true
