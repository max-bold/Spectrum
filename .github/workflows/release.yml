name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: BM_Spectrum_${{ github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows
          - os: macos-latest
            suffix: macos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app
        run: pyinstaller --clean --noconfirm BM_Spectrum_v0.2.spec

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/${env:APP_NAME}.exe" -DestinationPath "${env:APP_NAME}_${{ matrix.suffix }}.zip"

      - name: Package macOS binary
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}" "${APP_NAME}_${{ matrix.suffix }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}_${{ matrix.suffix }}
          path: ${{ env.APP_NAME }}_${{ matrix.suffix }}.zip

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: BM Spectrum ${{ github.ref_name }}
          files: release-assets/*.zip
          generate_release_notes: true
